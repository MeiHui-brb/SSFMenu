<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSF Family Menu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <div class="brand">SSF Family Menu</div>
  <input id="search" placeholder="Search dishes...">
  <select id="userSelect"></select>
  <button id="addUserBtn">+ Person</button>
  <button id="sidebarBtn">🍲 Interest</button>
</header>

<div id="menu"></div>

<div id="overlay" class="overlay"></div>
<aside id="sidebar" class="sidebar">
  <div class="tabs">
    <button class="tab active" data-tab="dishes">Dishes</button>
    <button class="tab" data-tab="family">Family</button>
  </div>
  <div id="sidebarContent"></div>
</aside>

<script src="script.js"></script>
</body>
</html>
