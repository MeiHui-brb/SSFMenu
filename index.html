<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSF Cafe Menu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h2>🍲 Today's Selection</h2>
    <button id="closeBtn">✕</button>
  </div>
  <div id="cartItems"></div>
  <button
    id="copyBtn"
    class="copy-btn"
  >
    📋 Copy
  </button>
</div>

<div id="overlay" class="overlay"></div>

<header class="header">
  <div class="header-top">
    <h1>SSF</h1>
    <input id="search" placeholder="Search menu...">
    <button id="cartBtn" class="cart-btn">🛒 <span id="cartCount">0</span></button>
  </div>

  <nav class="cats">
    <a href="#signature">⭐ Signature</a>
    <a href="#eggs">🥚 Eggs</a>
    <a href="#tofu">🧈 Tofu</a>
    <a href="#veg">🥬 Veg</a>
    <a href="#meat">🍖 Meat</a>
    <a href="#soup">🍲 Soup</a>
    <a href="#rice">🍚 Rice</a>
  </nav>
</header>

<div id="menu"></div>

<script src="script.js"></script>
</body>
</html>
